<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f4c5c, #000);
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      width: 900px;
      height: 520px;
      background: #fff;
      border-radius: 18px;
      display: flex;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    }

    /* LEFT SIDE */
    .left {
      width: 50%;
      background: url("https://images.unsplash.com/photo-1549880338-65ddcdfd017b") center/cover no-repeat;
      position: relative;
      color: #fff;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .left::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.45);
    }

    .left-content {
      position: relative;
      z-index: 1;
    }

    .left h1 {
      font-size: 34px;
      margin-bottom: 10px;
    }

    .left p {
      font-size: 15px;
      opacity: 0.85;
    }

    /* RIGHT SIDE */
    .right {
      width: 50%;
      padding: 50px 45px;
    }

    .right h2 {
      text-align: center;
      margin-bottom: 25px;
    }

    .input {
      width: 100%;
      padding: 12px;
      margin-bottom: 14px;
      border-radius: 6px;
      border: 1px solid #ddd;
      outline: none;
    }

    .terms {
      display: flex;
      align-items: center;
      font-size: 13px;
      margin-bottom: 18px;
    }

    .terms input {
      margin-right: 8px;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #000;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      margin-bottom: 14px;
    }

    .divider {
      text-align: center;
      margin: 12px 0;
      color: #aaa;
      font-size: 13px;
    }

    .social {
      width: 100%;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #ddd;
      background: #fff;
      cursor: pointer;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .apple {
      background: #000;
      color: #fff;
      border: none;
    }

    /* @media (max-width: 768px) {
      .card {
        flex-direction: column;
        height: auto;
        width: 95%;
      }

      .left, .right {
        width: 100%;
      }

      .left {
        height: 200px;
      }
    } */
  </style>
</head>
<body>

  <div class="card">

    <!-- LEFT PANEL -->
    <div class="left">
      <div class="left-content">
        <h1>Create your<br>Account</h1>
        <p>Share your artwork<br>and get projects!</p>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div class="right">
      <h2>Sign Up</h2>

      <input class="input" type="text" placeholder="First name">
      <input class="input" type="text" placeholder="Last name">
      <input class="input" type="email" placeholder="Email address">
      <input class="input" type="password" placeholder="Password">

      <div class="terms">
        <input type="checkbox">
        <span>Accept Terms & Conditions</span>
      </div>

      <button class="btn">Join us</button>

      <div class="divider">or</div>

      <button class="social">Sign up with Google</button>
      <button class="social apple">Sign up with Apple</button>
    </div>

  </div>

</body>
</html>
